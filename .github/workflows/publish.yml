name: Publish to npm

run-name: Publish v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in package.json
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Require successful release checks
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          for workflow in ci.yml codeql.yml live.yml; do
            conclusion="$(
              gh api --method GET \
                "/repos/${RELEASE_REPOSITORY}/actions/workflows/${workflow}/runs" \
                -f head_sha="$RELEASE_SHA" \
                -f per_page=1 \
                --jq '.workflow_runs[0].conclusion // ""'
            )"
            if [[ "$conclusion" != "success" ]]; then
              echo "$workflow has no successful run for $RELEASE_SHA"
              exit 1
            fi
          done
      - name: Use an npm version with trusted publishing support
        run: npm install --global npm@11.18.0
      - run: pnpm install --frozen-lockfile
      - name: Validate release version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          actual_version="$(node -p "require('./package.json').version")"
          if [[ "$actual_version" != "$EXPECTED_VERSION" ]]; then
            echo "package.json version $actual_version does not match requested version $EXPECTED_VERSION"
            exit 1
          fi
      - name: Publish with npm trusted publishing
        run: npm publish --access public
