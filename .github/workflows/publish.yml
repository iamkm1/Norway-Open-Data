name: Publish to npm

run-name: Publish v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in package.json
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use an npm version with trusted publishing support
        run: npm install --global npm@11.18.0
      - run: pnpm install --frozen-lockfile
      - name: Validate release version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          actual_version="$(node -p "require('./package.json').version")"
          if [[ "$actual_version" != "$EXPECTED_VERSION" ]]; then
            echo "package.json version $actual_version does not match requested version $EXPECTED_VERSION"
            exit 1
          fi
      - name: Publish with npm trusted publishing
        run: npm publish --access public
