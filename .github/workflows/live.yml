name: Live provider checks

# Detects upstream contract changes in supported source APIs before consumers do.
# Runs weekly and on demand; never on pull requests, so forks and untrusted
# code can never trigger outbound calls or read repository secrets.
on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-provider-checks
  cancel-in-progress: false

jobs:
  live:
    name: Supported source APIs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run live provider checks
        env:
          RUN_LIVE_TESTS: "true"
          NORWAY_OPEN_DATA_APPLICATION_NAME: ${{ vars.NORWAY_OPEN_DATA_APPLICATION_NAME }}
          NORWAY_OPEN_DATA_CONTACT_EMAIL: ${{ secrets.NORWAY_OPEN_DATA_CONTACT_EMAIL }}
          NVE_HYDAPI_KEY: ${{ secrets.NVE_HYDAPI_KEY }}
        run: pnpm test:live
