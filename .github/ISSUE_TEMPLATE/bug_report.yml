name: Bug report
description: Report reproducible SDK behavior that appears incorrect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve Norway Open Data SDK.
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Core/shared client
        - Brønnøysundregistrene
        - SSB
        - Kartverket
        - Entur
        - MET Norway
        - Company profiles
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Remove personal data, credentials, and private headers.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Node.js version and operating system
    validations:
      required: true
